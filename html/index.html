<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chess 3D</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    }

    #toast-container {
        position: fixed;
        top: 18px;
        left: 18px;
        width: 340px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .toast {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px 12px 14px;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(20, 22, 28, 0.96), rgba(32, 35, 44, 0.96));
        border-left: 4px solid #5ec26a;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        color: #f1f1f1;
        font-size: 14px;
        line-height: 1.35;
        opacity: 0;
        transform: translateX(-40px);
        transition: opacity 0.25s ease, transform 0.25s ease;
        pointer-events: auto;
    }

    .toast.show {
        opacity: 1;
        transform: translateX(0);
    }

    .toast.hide {
        opacity: 0;
        transform: translateX(-40px);
        transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .toast .icon {
        flex: 0 0 auto;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
    }

    .toast .text {
        flex: 1 1 auto;
        word-break: break-word;
    }

    .toast.type-success { border-left-color: #5ec26a; }
    .toast.type-info     { border-left-color: #4aa3df; }
    .toast.type-warning  { border-left-color: #e0b23d; }
    .toast.type-danger   { border-left-color: #e2574c; }

    .toast .progress {
        position: absolute;
        left: 0;
        bottom: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 0 0 0 8px;
        width: 100%;
        transform-origin: left;
    }
</style>
</head>
<body>
    <div id="toast-container"></div>

    <script>
        const container = document.getElementById('toast-container');
        const MAX_TOASTS = 5;
        const DEFAULT_DURATION = 4500;

        const ICONS = {
            success: '✓',
            info: 'i',
            warning: '!',
            danger: '✕',
        };

        function classifyMessage(msg) {
            const lower = msg.toLowerCase();
            if (lower.includes('xeque-mate') || lower.includes('perdeu') || lower.includes('desconectou')) return 'danger';
            if (lower.includes('xeque') || lower.includes('aguarde') || lower.includes('observando')) return 'warning';
            if (lower.includes('capturou') || lower.includes('venceu') || lower.includes('prontos')) return 'success';
            return 'info';
        }

        function addToast(message, type) {
            type = type || classifyMessage(message);

            while (container.children.length >= MAX_TOASTS) {
                container.removeChild(container.firstChild);
            }

            const toast = document.createElement('div');
            toast.className = 'toast type-' + type;

            const icon = document.createElement('div');
            icon.className = 'icon';
            icon.textContent = ICONS[type] || ICONS.info;

            const text = document.createElement('div');
            text.className = 'text';
            text.textContent = message;

            const progress = document.createElement('div');
            progress.className = 'progress';

            toast.appendChild(icon);
            toast.appendChild(text);
            toast.appendChild(progress);
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            progress.style.transition = `width ${DEFAULT_DURATION}ms linear`;
            requestAnimationFrame(() => { progress.style.width = '0%'; });

            const removeTimer = setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 400);
            }, DEFAULT_DURATION);

            toast.addEventListener('mouseenter', () => clearTimeout(removeTimer));
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || data.action !== 'chessNotify') return;
            addToast(data.message, data.type);
        });
    </script>
</body>
</html>
